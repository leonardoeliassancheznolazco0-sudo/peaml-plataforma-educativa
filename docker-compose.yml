services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - peaml-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://peaml_user:peaml_pass@postgres:5432/peaml_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkey_change_in_production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - peaml-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=peaml_user
      - POSTGRES_PASSWORD=peaml_pass
      - POSTGRES_DB=peaml_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peaml_user -d peaml_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - peaml-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - peaml-network

volumes:
  postgres_data:
  redis_data:

networks:
  peaml-network:
    driver: bridge