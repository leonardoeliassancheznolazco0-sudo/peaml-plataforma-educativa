version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: peaml_db
      POSTGRES_USER: peaml_user
      POSTGRES_PASSWORD: peaml_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://peaml_user:peaml_pass@postgres:5432/peaml_db
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: